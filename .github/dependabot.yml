version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      akka:
        patterns:
          - "Akka*"
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.Testing*"
          - "Microsoft.AspNetCore.Mvc.Testing"
          - "Microsoft.Extensions.TimeProvider.Testing"
          - "Verify*"
      servus:
        patterns:
          - "Servus"
          - "Servus.*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
