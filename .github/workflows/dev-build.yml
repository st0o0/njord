name: dev-build

# Owner-approved dev images: label = request, environment approval = gate.
# Put the `dev-build` label on a PR to request a build; every run then waits
# on the `dev` environment (required reviewer: owner) before pushing to GHCR.
# One-time setup in the repo settings: create environment `dev` with a
# required reviewer, and create the `dev-build` label.
on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

# A new push replaces a still-pending approval request for the same PR.
concurrency:
  group: dev-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    # Fork PRs are skipped cleanly — their GITHUB_TOKEN cannot push to GHCR.
    if: >-
      contains(github.event.pull_request.labels.*.name, 'dev-build') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev
    permissions:
      contents: read
      packages: write
      pull-requests: write   # result comment with the pull command
    steps:
      - uses: actions/checkout@v4
        with:
          # Build exactly the PR branch head, so the dev-<sha> tag matches the
          # commit it was built from (not the ephemeral merge commit).
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Compute short SHA
        id: vars
        run: echo "shortsha=$(cut -c1-7 <<< '${{ github.event.pull_request.head.sha }}')" >> "$GITHUB_OUTPUT"
      - name: Publish
        working-directory: src
        run: >-
          dotnet publish Njord/Njord.csproj
          -c Release
          -r linux-x64
          --self-contained false
          -o ../publish
          -p:Version=0.0.0-pr.${{ github.event.pull_request.number }}.${{ steps.vars.outputs.shortsha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: publish
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/st0o0/njord:pr-${{ github.event.pull_request.number }}
            ghcr.io/st0o0/njord:dev-${{ steps.vars.outputs.shortsha }}
          annotations: |
            index:org.opencontainers.image.description=Dev build of njord — unsigned amd64 image from a pull request, not a release
            index:org.opencontainers.image.source=https://github.com/st0o0/njord
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Comment the pull command on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const sha = '${{ steps.vars.outputs.shortsha }}';
            const marker = '<!-- dev-build-comment -->';
            const body = [
              marker,
              `🚧 Dev build published (\`dev-${sha}\`):`,
              '',
              '```bash',
              `docker pull ghcr.io/st0o0/njord:pr-${pr}`,
              '```',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: pr, per_page: 100 });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }
