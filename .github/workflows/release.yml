name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never cancel an in-flight release (a partial GHCR publish is worse than a wait).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # keyless cosign signing via OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/st0o0/njord
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.release-please.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHCR shows the package description only from the image-index
          # annotations on multi-arch images — per-image LABELs don't surface.
          annotations: |
            index:org.opencontainers.image.description=Kachelmann weather API to MQTT bridge for Home Assistant
            index:org.opencontainers.image.source=https://github.com/st0o0/njord
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true   # SLSA build provenance attestation
          sbom: true         # SBOM attestation
      - uses: sigstore/cosign-installer@v3
      - name: Sign the published image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/st0o0/njord@${DIGEST}"
