name: ci

# Validation runs on pull requests only. A PR is tested on its merge-result
# commit, so re-running the same checks on the post-merge push to main would be
# pure duplication — release.yml owns main. Enable branch protection ("require
# a pull request before merging") so every change to main is validated here.
#
# No paths filter: these jobs are required checks, and a filtered-out workflow
# never reports, leaving the PR stuck on "Expected — waiting". The jobs are
# cheap enough to always run.
on:
  pull_request:

permissions:
  contents: read

# One in-flight run per PR; pushing new commits cancels the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Named to match the branch-protection required checks: test, lint, build, commitlint.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      # xUnit v3 mtp-v2 supports `dotnet test` at solution level — runs unit,
      # integration (Testcontainers), and E2E projects in one go.
      - name: Run tests
        working-directory: src
        run: dotnet test Njord.slnx

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
      - name: dotnet format
        working-directory: src
        run: dotnet format Njord.slnx whitespace --verify-no-changes

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: njord:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          docker run -d --name njord-smoke \
            -e Njord__Locations__0__Name=smoke \
            -e Njord__Locations__0__Latitude=47.05 \
            -e Njord__Locations__0__Longitude=8.31 \
            -e Njord__Models__0=icon_global \
            -p 8080:8080 \
            njord:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/healthz; then
              echo ""
              echo "smoke ok: /healthz responded Healthy"
              exit 0
            fi
            sleep 1
          done
          echo "smoke FAILED: /healthz did not respond within 10s"
          docker logs njord-smoke
          exit 1
