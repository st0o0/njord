name: ci

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/**/*.csproj', 'src/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Publish (linux-x64)
        working-directory: src
        run: dotnet publish Njord/Njord.csproj -c Release -r linux-x64 -o ../publish/linux-x64

      - name: Run tests
        working-directory: src
        run: dotnet test Njord.slnx

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-linux-x64
          path: publish/linux-x64/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
      - name: dotnet format
        working-directory: src
        run: dotnet format Njord.slnx whitespace --verify-no-changes

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: publish-linux-x64
          path: publish/linux-x64
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: publish/linux-x64
          push: false
          load: true
          tags: njord:ci
      - name: Smoke test
        run: |
          docker run -d --name njord-smoke \
            -e Njord__Locations__0__Name=smoke \
            -e Njord__Locations__0__Latitude=47.05 \
            -e Njord__Locations__0__Longitude=8.31 \
            -e Njord__Models__0=icon_global \
            -p 8080:8080 \
            njord:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/healthz; then
              echo ""
              echo "smoke ok: /healthz responded Healthy"
              exit 0
            fi
            sleep 1
          done
          echo "smoke FAILED: /healthz did not respond within 10s"
          docker logs njord-smoke
          exit 1
