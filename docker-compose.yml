services:
  njord:
    image: ghcr.io/st0o0/njord:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Required — the Mosquitto broker host (e.g. the HA host IP or hostname).
      - Njord__Mqtt__Host=
      # Optional MQTT credentials.
      #- Njord__Mqtt__Username=
      #- Njord__Mqtt__Password=
      # Default location (Lucerne). Override or add more with index suffixes.
      - Njord__Locations__0__Name=home
      - Njord__Locations__0__Latitude=47.05
      - Njord__Locations__0__Longitude=8.31
